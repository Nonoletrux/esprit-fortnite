<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Checklist</title>
    <style>
        /* --- Styles Généraux --- */
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* --- Conteneur global de la Checklist --- */
        .checklist-container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- Ligne par type d'esprit --- */
        .sprite-row {
            background: #18181c;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #2a2a30;
        }

        .row-title {
            font-size: 1.2rem;
            color: #00bcff;
            margin-bottom: 15px;
            text-transform: capitalize;
            border-left: 4px solid #00bcff;
            padding-left: 10px;
        }

        /* --- Grille des Esprits (4 par ligne) --- */
        .sprite-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Cas particulier pour Burnt Peanut qui est seul */
        .single-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 220px));
            justify-content: center;
        }

        /* Pour les téléphones */
        @media (max-width: 650px) {
            .sprite-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- Carte Esprit --- */
        label {
            cursor: pointer;
        }

        .sprite-card {
            background: #1e1e24;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: all 0.25s ease;
            position: relative;
            user-select: none;
        }

        .sprite-card:hover {
            transform: translateY(-3px);
            border-color: #555;
        }

        /* Image par défaut (sombre/grisée si non possédée) */
        .sprite-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            filter: grayscale(100%) opacity(40%);
            transition: all 0.25s ease;
        }

        .sprite-name {
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
            text-transform: capitalize;
        }

        /* Cache la checkbox HTML standard */
        .sprite-checkbox {
            display: none;
        }

        /* --- État quand l'Esprit est COCHÉ --- */
        .sprite-checkbox:checked + .sprite-card {
            background: #27ae60; 
            border-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
        }

        .sprite-checkbox:checked + .sprite-card .sprite-img {
            filter: grayscale(0%) opacity(100%); /* Colore l'image */
        }

        .sprite-checkbox:checked + .sprite-card .sprite-name {
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Sprite Checklist</h1>
    <div class="subtitle">Complète ta collection du Chapitre 7 - Saison 3</div>

                <label><input type="checkbox" class="sprite-checkbox" id="fantome_gold"><div class="sprite-card"><img src="images/fantome_gold.png" class="sprite-img"><div class="sprite-name">Fantôme Gold</div></div></label>

    </div>
    <script>
        // Dès que la page a fini de charger
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.sprite-checkbox');

            // 1. Charger l'état sauvegardé au démarrage
            checkboxes.forEach(checkbox => {
                // On regarde dans le navigateur si la case était cochée
                const savedState = localStorage.getItem(checkbox.id);
                if (savedState === 'true') {
                    checkbox.checked = true;
                }

                // 2. Écouter les clics pour sauvegarder les changements
                checkbox.addListener = checkbox.addEventListener('change', (e) => {
                    localStorage.setItem(checkbox.id, e.target.checked);
                });
            });
        });
    </script>
</body>
</html>
