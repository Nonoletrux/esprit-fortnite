<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Checklist</title>
    <style>
        /* --- Styles Généraux --- */
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* --- Zone de Connexion Firebase --- */
        .auth-container {
            background: #1e1e24;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            max-width: 1000px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .auth-inputs {
            display: flex;
            gap: 10px;
        }

        .auth-inputs input {
            background: #121214;
            border: 1px solid #444;
            padding: 8px 12px;
            color: white;
            border-radius: 6px;
            outline: none;
        }

        .auth-buttons button {
            background: #00bcff;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .auth-buttons button:hover {
            background: #009cd3;
        }

        .auth-buttons .btn-secondary {
            background: #444;
            margin-left: 5px;
        }

        .auth-buttons .btn-secondary:hover {
            background: #555;
        }

        .user-logged {
            display: none;
            gap: 15px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        /* --- Conteneur global de la Checklist --- */
        .checklist-container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- Ligne par type d'esprit --- */
        .sprite-row {
            background: #18181c;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #2a2a30;
        }

        .row-title {
            font-size: 1.2rem;
            color: #00bcff;
            margin-bottom: 15px;
            text-transform: capitalize;
            border-left: 4px solid #00bcff;
            padding-left: 10px;
        }

        /* --- Grille des Esprits (4 par ligne) --- */
        .sprite-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Cas particulier pour Burnt Peanut qui est seul */
        .single-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 220px));
            justify-content: center;
        }

        /* Pour les téléphones */
        @media (max-width: 650px) {
            .sprite-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .auth-container {
                flex-direction: column;
                gap: 15px;
            }
            .auth-inputs {
                flex-direction: column;
                width: 100%;
            }
        }

        /* --- Carte Esprit --- */
        label {
            cursor: pointer;
        }

        .sprite-card {
            background: #1e1e24;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: all 0.25s ease;
            position: relative;
            user-select: none;
        }

        .sprite-card:hover {
            transform: translateY(-3px);
            border-color: #555;
        }

        /* Image par défaut (sombre/grisée si non possédée) */
        .sprite-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            filter: grayscale(100%) opacity(40%);
            transition: all 0.25s ease;
        }

        .sprite-name {
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #888;
            text-transform: capitalize;
        }

        /* Cache la checkbox HTML standard */
        .sprite-checkbox {
            display: none;
        }

        /* --- État quand l'Esprit est COCHÉ --- */
        .sprite-checkbox:checked + .sprite-card {
            background: #27ae60; 
            border-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
        }

        .sprite-checkbox:checked + .sprite-card .sprite-img {
            filter: grayscale(0%) opacity(100%); /* Colore l'image */
        }

        .sprite-checkbox:checked + .sprite-card .sprite-name {
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Sprite Checklist</h1>
    <div class="subtitle">Complète ta collection du Chapitre 7 - Saison 3</div>

    <div class="auth-container">
        <div id="auth-logged-out" style="display: flex; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div class="auth-inputs">
                <input type="email" id="auth-email" placeholder="Adresse e-mail">
                <input type="password" id="auth-password" placeholder="Mot de passe">
            </div>
            <div class="auth-buttons">
                <button id="btn-login">Se connecter</button>
                <button id="btn-signup" class="btn-secondary">S'inscrire</button>

        </div>
        <div id="auth-logged-in" class="user-logged">

            <div class="auth-buttons">

            </div>
        </div>
    </div>

                <label><input type="checkbox" class="sprite-checkbox" id="terre_gold"><div class="sprite-card"><img src="images/terre_gold.png" class="sprite-img"><div class="sprite-name">Terre Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="terre_gummy"><div class="sprite-card"><img src="images/terre_gummy.png" class="sprite-img"><div class="sprite-name">Terre Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="terre_galaxie"><div class="sprite-card"><img src="images/terre_galaxie.png" class="sprite-img"><div class="sprite-name">Terre Galaxie</div></div></label>
            </div>
        </div>

        <div class="sprite-row">
            <div class="row-title">Esprit du Feu</div>
            <div class="sprite-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="feu_normal"><div class="sprite-card"><img src="images/feu_normal.png" class="sprite-img"><div class="sprite-name">Feu</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="feu_gold"><div class="sprite-card"><img src="images/feu_gold.png" class="sprite-img"><div class="sprite-name">Feu Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="feu_gummy"><div class="sprite-card"><img src="images/feu_gummy.png" class="sprite-img"><div class="sprite-name">Feu Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="feu_galaxie"><div class="sprite-card"><img src="images/feu_galaxie.png" class="sprite-img"><div class="sprite-name">Feu Galaxie</div></div></label>
            </div>
        </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Canard</div>
            <div class="sprite-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="canard_normal"><div class="sprite-card"><img src="images/canard_normal.png" class="sprite-img"><div class="sprite-name">Canard</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="canard_gold"><div class="sprite-card"><img src="images/canard_gold.png" class="sprite-img"><div class="sprite-name">Canard Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="canard_gummy"><div class="sprite-card"><img src="images/canard_gummy.png" class="sprite-img"><div class="sprite-name">Canard Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="canard_galaxie"><div class="sprite-card"><img src="images/canard_galaxie.png" class="sprite-img"><div class="sprite-name">Canard Galaxie</div></div></label>
            </div>
        </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Fantôme</div>
            <div class="sprite-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="fantome_normal"><div class="sprite-card"><img src="images/fantome_normal.png" class="sprite-img"><div class="sprite-name">Fantôme</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="fantome_gold"><div class="sprite-card"><img src="images/fantome_gold.png" class="sprite-img"><div class="sprite-name">Fantôme Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="fantome_gummy"><div class="sprite-card"><img src="images/fantome_gummy.png" class="sprite-img"><div class="sprite-name">Fantôme Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="fantome_galaxie"><div class="sprite-card"><img src="images/fantome_galaxie.png" class="sprite-img"><div class="sprite-name">Fantôme Galaxie</div></div></label>
            </div>
        </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Onirique</div>
            <div class="sprite-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="onirique_normal"><div class="sprite-card"><img src="images/onirique_normal.png" class="sprite-img"><div class="sprite-name">Onirique</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="onirique_gold"><div class="sprite-card"><img src="images/onirique_gold.png" class="sprite-img"><div class="sprite-name">Onirique Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="onirique_gummy"><div class="sprite-card"><img src="images/onirique_gummy.png" class="sprite-img"><div class="sprite-name">Onirique Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="onirique_galaxie"><div class="sprite-card"><img src="images/onirique_galaxie.png" class="sprite-img"><div class="sprite-name">Onirique Galaxie</div></div></label>
            </div>
        </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Démoniaque</div>
            <div class="sprite-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="demoniaque_normal"><div class="sprite-card"><img src="images/demoniaque_normal.png" class="sprite-img"><div class="sprite-name">Démoniaque</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="demoniaque_gold"><div class="sprite-card"><img src="images/demoniaque_gold.png" class="sprite-img"><div class="sprite-name">Démoniaque Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="demoniaque_gummy"><div class="sprite-card"><img src="images/demoniaque_gummy.png" class="sprite-img"><div class="sprite-name">Démoniaque Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="demoniaque_galaxie"><div class="sprite-card"><img src="images/demoniaque_galaxie.png" class="sprite-img"><div class="sprite-name">Démoniaque Galaxie</div></div></label>
            </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Punk</div>

                <label><input type="checkbox" class="sprite-checkbox" id="punk_normal"><div class="sprite-card"><img src="images/punk_normal.png" class="sprite-img"><div class="sprite-name">Punk</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="punk_gold"><div class="sprite-card"><img src="images/punk_gold.png" class="sprite-img"><div class="sprite-name">Punk Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="punk_gummy"><div class="sprite-card"><img src="images/punk_gummy.png" class="sprite-img"><div class="sprite-name">Punk Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="punk_galaxie"><div class="sprite-card"><img src="images/punk_galaxie.png" class="sprite-img"><div class="sprite-name">Punk Galaxie</div></div></label>

        <div class="sprite-row">

                <label><input type="checkbox" class="sprite-checkbox" id="royale_gold"><div class="sprite-card"><img src="images/royale_gold.png" class="sprite-img"><div class="sprite-name">Royale Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="royale_gummy"><div class="sprite-card"><img src="images/royale_gummy.png" class="sprite-img"><div class="sprite-name">Royale Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="royale_galaxie"><div class="sprite-card"><img src="images/royale_galaxie.png" class="sprite-img"><div class="sprite-name">Royale Galaxie</div></div></label>

                <label><input type="checkbox" class="sprite-checkbox" id="pointzero_gold"><div class="sprite-card"><img src="images/pointzero_gold.png" class="sprite-img"><div class="sprite-name">Point Zéro Gold</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="pointzero_gummy"><div class="sprite-card"><img src="images/pointzero_gummy.png" class="sprite-img"><div class="sprite-name">Point Zéro Gummy</div></div></label>
                <label><input type="checkbox" class="sprite-checkbox" id="pointzero_galaxie"><div class="sprite-card"><img src="images/pointzero_galaxie.png" class="sprite-img"><div class="sprite-name">Point Zéro Galaxie</div></div></label>
            </div>

        <div class="sprite-row">
            <div class="row-title">Esprit Secret</div>
            <div class="single-grid">
                <label><input type="checkbox" class="sprite-checkbox" id="burnt_peanut"><div class="sprite-card"><img src="images/burnt_peanut.png" class="sprite-img"><div class="sprite-name">Burnt Peanut</div></div></label>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC1xr1uOnyTMRqKja5jMRfQLh79dvbFyJY",
            authDomain: "esprit-fortnite.firebaseapp.com",
            databaseURL: "https://esprit-fortnite-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "esprit-fortnite",
            storageBucket: "esprit-fortnite.firebasestorage.app",
            messagingSenderId: "281977160900",
            appId: "1:281977160900:web:957f663f5ab9dee131b591",
            measurementId: "G-N3167ZXX0T"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        const checkboxes = document.querySelectorAll('.sprite-checkbox');

        // --- GESTION DE LA CONNEXION ---
        const loggedOutDiv = document.getElementById('auth-logged-out');
        const loggedInDiv = document.getElementById('auth-logged-in');
        const userEmailDisplay = document.getElementById('user-email-display');

        // Écouter le changement d'état (Connecté / Déconnecté)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loggedOutDiv.style.display = 'none';
                loggedInDiv.style.display = 'flex';
                userEmailDisplay.textContent = `Connecté : ${user.email}`;
                
                // Charger la liste depuis Firebase dès qu'on se connecte
                const userDataRef = ref(db, 'users/' + user.uid);
                get(userDataRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        checkboxes.forEach(cb => {
                            cb.checked = data[cb.id] || false;
                        });
                    } else {
                        resetCheckboxes();
                    }
                });
            } else {
                currentUser = null;
                loggedOutDiv.style.display = 'flex';
                loggedInDiv.style.display = 'none';
                resetCheckboxes();
            }
        });

        // Bouton Inscription
        document.getElementById('btn-signup').addEventListener('click', () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Remplis les champs !");
            
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => alert("Compte créé avec succès !"))
                .catch(err => alert("Erreur : " + err.message));
        });

        // Bouton Connexion
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Remplis les champs !");

            signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert("Erreur : " + err.message));
        });

        // Bouton Déconnexion
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        // --- GESTION DE LA SAUVEGARDE EN LIGNE ---
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                if (currentUser) {
                    // Si connecté, on enregistre dans Firebase sous l'UID de l'utilisateur
                    set(ref(db, `users/${currentUser.uid}/${checkbox.id}`), checkbox.checked);
                } else {
                    alert("Connecte-toi ou crée un compte pour enregistrer tes esprits !");
                    checkbox.checked = !checkbox.checked; // Annule le clic si non connecté
                }
            });
        });

        function resetCheckboxes() {
            checkboxes.forEach(cb => cb.checked = false);
        }
    </script>
</body>
</html>
